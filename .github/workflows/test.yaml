---
name: Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spell:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: go.sum

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: Install mdformat
        run: python -m pip install mdformat mdformat-gfm
      - name: Check Markdown formatting
        run: find . -name '*.md' -not -path './.git/*' -exec mdformat --check {} +
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  htmlfmt:
    name: HTML Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Check HTML formatting
        run: |
          make htmlfmt
          git diff --exit-code

  build-matrix:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goarch: arm64
            goos: windows
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git tag build-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Download modules
        run: go mod download
      - name: Build binary
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ramenctl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ramenctl*
          retention-days: 15
          compression-level: 9

  test-matrix:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
        runner:
          - ubuntu-24.04 # x86_64
          - ubuntu-24.04-arm # arm64
          - windows-latest # x86_64
          - macos-15-intel # x86_64
          - macos-15 # arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Create build tag
        run: git tag latest
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Download modules
        run: go mod download
      - name: Run tests
        run: make test
